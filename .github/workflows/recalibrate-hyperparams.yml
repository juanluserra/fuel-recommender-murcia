name: recalibrate-hyperparams

on:
  workflow_dispatch:
    inputs:
      scope_id:
        description: Scope to evaluate
        required: false
        default: alcantarilla_murcia
      fuel_col:
        description: Fuel column to evaluate
        required: false
        default: precio_gasoleo_a
      run_rolling:
        description: Run rolling backtest
        required: false
        default: "true"
  schedule:
    - cron: "43 5 1 */3 *"

permissions:
  contents: write

jobs:
  recalibrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run recalibration
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.run_rolling || 'true' }}" = "true" ]; then
            EXTRA="--run-rolling"
          fi
          python scripts/recalibrate_hyperparams.py \
            --scope-id "${{ github.event.inputs.scope_id || 'alcantarilla_murcia' }}" \
            --fuel-col "${{ github.event.inputs.fuel_col || 'precio_gasoleo_a' }}" \
            --show-progress \
            $EXTRA

      - name: Upload experiment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hyperparam-experiments
          path: |
            data/experiments/**
            config/candidates/**

      - name: Commit candidate configs if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/candidates data/experiments
          if git diff --cached --quiet; then
            echo "No hay cambios para commitear"
          else
            git commit -m "chore: hyperparameter recalibration artifacts $(date -u +%F)"
            git push
          fi
